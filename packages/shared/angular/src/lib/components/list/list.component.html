@let loading = internalOptions?.provider?.loading?.();
@if (componentType(); as cmp) {
  <ng-container
    *ngComponentOutlet="cmp; inputs: componentInputs()"
  ></ng-container>
}
<smart-loader [show]="loading ?? false"></smart-loader>
@if (!loading && !internalOptions?.provider?.list?.()?.length) {
  <h2
    class="smart:mt-4 smart:text-center smart:text-gray-500 smart:dark:text-gray-400"
  >
    {{ 'noResults' | translate }}
  </h2>
}
