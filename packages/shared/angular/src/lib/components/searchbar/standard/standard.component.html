@if (show()) {
  <div [class]="containerClasses()">
    <input
      type="search"
      [formControl]="control()"
      [class]="inputClasses()"
      [placeholder]="options()?.placeholder ?? 'search' | translate"
      (blur)="tryHide()"
    />
    <svg
      viewBox="0 0 16 16"
      fill="currentColor"
      aria-hidden="true"
      class="smart:pointer-events-none smart:absolute smart:inset-y-0 smart:right-0 smart:mr-3 smart:size-5 smart:self-center smart:text-gray-400 dark:smart:text-gray-500"
    >
      <path
        d="M15 8A7 7 0 1 1 1 8a7 7 0 0 1 14 0Zm-6 3.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM7.293 5.293a1 1 0 1 1 .99 1.667c-.459.134-1.033.566-1.033 1.29v.25a.75.75 0 1 0 1.5 0v-.115a2.5 2.5 0 1 0-2.518-4.153.75.75 0 1 0 1.061 1.06Z"
        clip-rule="evenodd"
        fill-rule="evenodd"
      />
    </svg>
  </div>
} @else if (options()?.showToggleButton) {
  <button type="button" [class]="toggleButtonClasses()" (click)="setShow()">
    <svg
      viewBox="0 0 16 16"
      fill="currentColor"
      aria-hidden="true"
      class="smart:size-5"
    >
      <path
        d="M15 8A7 7 0 1 1 1 8a7 7 0 0 1 14 0Zm-6 3.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM7.293 5.293a1 1 0 1 1 .99 1.667c-.459.134-1.033.566-1.033 1.29v.25a.75.75 0 1 0 1.5 0v-.115a2.5 2.5 0 1 0-2.518-4.153.75.75 0 1 0 1.061 1.06Z"
        clip-rule="evenodd"
        fill-rule="evenodd"
      />
    </svg>
  </button>
}
