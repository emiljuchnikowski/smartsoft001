@let optionsLocal = options();
@if (optionsLocal) {
  <div class="smart:relative">
    @if (optionsLocal.options?.info) {
      <div class="smart:absolute smart:right-0 smart:top-0">
        <smart-info
          [options]="{ text: optionsLocal.options?.info ?? '' }"
        ></smart-info>
      </div>
    }
    <span
      class="smart:block smart:text-sm smart:font-medium smart:text-gray-500 smart:dark:text-gray-400"
    >
      {{ optionsLocal?.item?.() | smartModelLabel: optionsLocal.key : type() }}
    </span>
    @let item = optionsLocal?.item?.();
    @if (item) {
      <ng-container
        *ngComponentOutlet="component(); inputs: componentInputs()"
      ></ng-container>
    } @else {
      <div
        class="smart:h-4 smart:w-3/4 smart:animate-pulse smart:rounded smart:bg-gray-200 smart:dark:bg-gray-700"
      ></div>
    }
  </div>
}
