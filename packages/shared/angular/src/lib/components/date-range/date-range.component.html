<div class="smart:inline-flex smart:items-center smart:gap-2">
  <button
    type="button"
    class="smart:inline-flex smart:items-center smart:gap-2 smart:rounded-md smart:border smart:border-gray-300 smart:bg-white smart:px-3 smart:py-2 smart:text-sm smart:font-medium smart:text-gray-700 smart:shadow-xs hover:smart:bg-gray-50 dark:smart:bg-gray-800 dark:smart:border-gray-600 dark:smart:text-gray-300 dark:hover:smart:bg-gray-700"
    (click)="onClick()"
  >
    <svg
      class="smart:size-5 smart:text-gray-400"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 20 20"
      fill="currentColor"
    >
      <path
        fill-rule="evenodd"
        d="M5.75 2a.75.75 0 0 1 .75.75V4h7V2.75a.75.75 0 0 1 1.5 0V4h.25A2.75 2.75 0 0 1 18 6.75v8.5A2.75 2.75 0 0 1 15.25 18H4.75A2.75 2.75 0 0 1 2 15.25v-8.5A2.75 2.75 0 0 1 4.75 4H5V2.75A.75.75 0 0 1 5.75 2Zm-1 5.5c-.69 0-1.25.56-1.25 1.25v6.5c0 .69.56 1.25 1.25 1.25h10.5c.69 0 1.25-.56 1.25-1.25v-6.5c0-.69-.56-1.25-1.25-1.25H4.75Z"
        clip-rule="evenodd"
      />
    </svg>
    @if (value && value?.start && value?.end) {
      {{ value.start + ' - ' + value.end }}
    } @else {
      {{ 'select' | translate }}
    }
  </button>

  @if (value) {
    <button
      type="button"
      class="smart:text-gray-400 hover:smart:text-gray-600 smart:p-1 smart:rounded dark:smart:text-gray-500 dark:hover:smart:text-gray-300"
      (click)="onClear()"
    >
      <svg
        class="smart:size-4"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 20 20"
        fill="currentColor"
      >
        <path
          d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"
        />
      </svg>
    </button>
  }
</div>

@if (isOpen()) {
  <smart-date-range-modal
    [previousState]="calendarData"
    (apply)="onModalApply($event)"
    (dismiss)="onModalDismiss()"
  />
}
