<div [class]="containerClasses()">
  <button type="button" (click)="toggle(); $event.stopPropagation()">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 20 20"
      fill="currentColor"
      class="smart:h-5 smart:w-5"
    >
      <path
        fill-rule="evenodd"
        d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-7-4a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM9 9a.75.75 0 0 0 0 1.5h.253a.25.25 0 0 1 .244.304l-.459 2.066A1.75 1.75 0 0 0 10.747 15H11a.75.75 0 0 0 0-1.5h-.253a.25.25 0 0 1-.244-.304l.459-2.066A1.75 1.75 0 0 0 9.253 9H9Z"
        clip-rule="evenodd"
      />
    </svg>
  </button>
  @if (isOpen()) {
    <div
      data-testid="info-popover"
      class="smart:absolute smart:z-10 smart:mt-2 smart:w-64 smart:rounded-lg smart:bg-white smart:p-3 smart:text-sm smart:text-gray-700 smart:shadow-lg smart:ring-1 smart:ring-gray-900/5 smart:dark:bg-gray-800 smart:dark:text-gray-300 smart:dark:ring-white/10"
    >
      {{ options().text | translate }}
    </div>
  }
</div>
