<div [class]="containerClasses()">
  <div #topTpl></div>

  <dl class="smart:divide-y smart:divide-gray-100 dark:smart:divide-white/10">
    @for (field of fields; track field.key) {
      <div
        class="smart:px-4 smart:py-4 smart:sm:grid smart:sm:grid-cols-3 smart:sm:gap-4"
      >
        <smart-detail
          [type]="type"
          [options]="{
            key: field.key,
            options: field.options,
            cellPipe: cellPipe() ?? undefined,
            item: item,
            loading: loading ?? undefined,
          }"
        ></smart-detail>
      </div>
    }
  </dl>

  <div #bottomTpl></div>
</div>
