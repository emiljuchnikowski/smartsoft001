<span
  [class]="cssClass()"
  [attr.data-color]="color()"
  [attr.data-size]="size()"
>
  @if (options()?.withDot) {
    <span aria-hidden="true" class="smart-badge-dot">&bull;</span>
  }
  <span class="smart-badge-text">{{ text() }}</span>
  @if (options()?.withRemove) {
    <button type="button" aria-label="Remove" (click)="remove()">
      &times;
    </button>
  }
</span>
