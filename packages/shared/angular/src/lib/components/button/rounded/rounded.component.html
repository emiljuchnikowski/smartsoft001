@if (mode() !== 'confirm') {
  @let loading = options()?.loading?.();
  <button
    [type]="options()?.type ?? 'button'"
    [class]="buttonClasses()"
    [disabled]="disabled() || loading"
    (click)="invoke()"
  >
    @if (loading) {
      <smart-icon name="spinner" />
    } @else {
      <ng-content></ng-content>
    }
  </button>
} @else {
  <button
    type="button"
    class="smart:rounded-md smart:bg-white smart:px-3 smart:py-2 smart:text-sm smart:font-semibold smart:text-gray-900 smart:shadow-xs smart:inset-ring smart:inset-ring-gray-300 hover:smart:bg-gray-50 dark:smart:bg-white/10 dark:smart:text-white dark:smart:shadow-none dark:smart:inset-ring-white/5 dark:hover:smart:bg-white/20"
    (click)="confirmCancel()"
  >
    {{ 'cancel' | translate }}
  </button>
  <button
    type="button"
    class="smart:rounded-md smart:bg-indigo-600 smart:px-3 smart:py-2 smart:text-sm smart:font-semibold smart:text-white smart:shadow-xs hover:smart:bg-indigo-500 focus-visible:smart:outline-2 focus-visible:smart:outline-offset-2 focus-visible:smart:outline-indigo-600 dark:smart:bg-indigo-500 dark:smart:shadow-none dark:hover:smart:bg-indigo-400 dark:focus-visible:smart:outline-indigo-500"
    (click)="confirmInvoke()"
  >
    {{ 'confirm' | translate }}
  </button>
}
